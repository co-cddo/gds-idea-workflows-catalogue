name: CI Tests (Python Package)

on:
  workflow_call:

jobs:
  resolve-python:
    name: Resolve Python versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: pyproject.toml

      - name: Detect supported versions from requires-python
        id: detect
        run: |
          MIN=$(grep 'requires-python' pyproject.toml | head -1 | sed 's/.*>=\([0-9]*\.[0-9]*\).*/\1/')
          echo "Minimum Python: $MIN"
          VERSIONS=$(echo '["3.11","3.12","3.13","3.14"]' | jq -c "[.[] | select(. >= \"$MIN\")]")
          echo "Matrix: $VERSIONS"
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: resolve-python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.resolve-python.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: uv run --python ${{ matrix.python-version }} pytest -m "not integration" -v
