name: CI Reusable Workflow

on:
  workflow_call:
    inputs:
      run-version-check:
        type: boolean

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Verify Python version
        run: python --version

      # Run the version-bump check ONLY on pull requests
      - name: Check version has been bumped
        if: inputs.run-version-check
        run: |
          PR_VERSION=$(grep -oP '^version = "\K[^"]*' pyproject.toml)

          git fetch origin "${{ github.base_ref }}"
          BASE_VERSION=$(git show "origin/${{ github.base_ref }}:pyproject.toml" | grep -oP '^version = "\K[^"]*')

          echo "Base version: $BASE_VERSION"
          echo "PR version: $PR_VERSION"

          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "❌ Version in pyproject.toml has not been bumped"
            exit 1
          fi

          echo "✅ Version bumped from $BASE_VERSION to $PR_VERSION"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest -v

  cdk-diff:
    if: github.event_name == 'pull_request'
    name: CDK Diff (comment on PR)
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Select env from PR target branch
        id: env
        run: |
          if [ "${{ github.base_ref }}" = "dev" ]; then
            echo "PHASE=dev" >> $GITHUB_OUTPUT
            echo "ROLE_ARN=arn:aws:iam::992382722318:role/deploy-dev" >> $GITHUB_OUTPUT
          elif [ "${{ github.base_ref }}" = "main" ]; then
            echo "PHASE=prod" >> $GITHUB_OUTPUT
            echo "ROLE_ARN=arn:aws:iam::588077357019:role/deploy-prod" >> $GITHUB_OUTPUT
          else
            echo "Unsupported base branch: ${{ github.base_ref }}"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.ROLE_ARN }}
          aws-region: eu-west-2
          role-session-name: github-actions-cdk-diff

      - name: CDK synth (produce cdk.out)
        run: |
          source .venv/bin/activate
          cdk synth --context phase=${{ steps.env.outputs.PHASE }}

      - name: CDK Diff (comment on PR)
        uses: corymhall/cdk-diff-action@v2
        with:
          failOnDestructiveChanges: false
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          app-args: "--app cdk.out --fail=false"
