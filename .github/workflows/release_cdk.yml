name: Release

on:
  push:
    branches: 
      - main
      - dev

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  ci:
    uses: ./.github/workflows/ci_workflow_cdk.yml
    with:
      run-version-check: false
  cd:
    needs: ci
    uses: ./.github/workflows/cd_workflow_cdk.yml
