name: CI Reusable Workflow

on:
  workflow_call:
    inputs:
      run-version-check:
        type: boolean

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Verify Python version
        run: python --version

      # Run the version-bump check ONLY on pull requests
      - name: Check version has been bumped
        if: inputs.run-version-check
        run: |
          PR_VERSION=$(grep -oP '^version = "\K[^"]*' pyproject.toml)

          git fetch origin "${{ github.base_ref }}"
          BASE_VERSION=$(git show "origin/${{ github.base_ref }}:pyproject.toml" | grep -oP '^version = "\K[^"]*')

          echo "Base version: $BASE_VERSION"
          echo "PR version: $PR_VERSION"

          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "❌ Version in pyproject.toml has not been bumped"
            exit 1
          fi

          echo "✅ Version bumped from $BASE_VERSION to $PR_VERSION"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12", "3.13" ]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest -v
