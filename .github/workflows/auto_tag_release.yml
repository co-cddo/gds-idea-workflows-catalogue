name: Auto Tag & Release

# Creates a git tag and GitHub release on push to main.
# Version bump level is determined by PR labels:
#   - bump:major -> major version bump
#   - bump:minor -> minor version bump
#   - (default)  -> patch version bump
#
# Usage in your repo:
#   jobs:
#     release:
#       uses: co-cddo/gds-idea-workflows-catalogue/.github/workflows/auto_tag_release.yml@main
#       secrets: inherit

on:
  workflow_call:
    outputs:
      tag:
        description: "The tag that was created (empty string if skipped)"
        value: ${{ jobs.auto-tag.outputs.tag }}

permissions:
  contents: write
  pull-requests: read

jobs:
  auto-tag:
    name: Tag & Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if HEAD already has a tag
        id: check
        run: |
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR number from merge commit
        if: steps.check.outputs.skip == 'false'
        id: pr
        run: |
          # Try (#N) format first (squash merge / rebase merge)
          PR_NUMBER=$(git log -1 --format='%s' | grep -oE '\(#[0-9]+\)' | grep -oE '[0-9]+' | tail -1)
          # Fallback: "Merge pull request #N" format (standard merge)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(git log -1 --format='%s' | grep -oE 'Merge pull request #[0-9]+' | grep -oE '[0-9]+')
          fi
          echo "PR number: $PR_NUMBER"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get PR labels
        if: steps.check.outputs.skip == 'false' && steps.pr.outputs.number != ''
        uses: snnaplab/get-labels-action@v1
        with:
          number: ${{ steps.pr.outputs.number }}

      - name: Resolve bump level from PR labels
        if: steps.check.outputs.skip == 'false'
        id: bump
        run: |
          LABELS="${LABELS:-[]}"
          echo "Labels on merged PR: $LABELS"

          if echo "$LABELS" | jq -e 'index("bump:major")' > /dev/null 2>&1; then
            BUMP="major"
          elif echo "$LABELS" | jq -e 'index("bump:minor")' > /dev/null 2>&1; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          echo "Bump level: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          echo "Latest tag: $LATEST"

          if [ -z "$LATEST" ]; then
            NEXT_TAG="v0.1.0"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            case "${{ steps.bump.outputs.bump }}" in
              major)
                NEXT_TAG="v$((MAJOR + 1)).0.0"
                ;;
              minor)
                NEXT_TAG="v${MAJOR}.$((MINOR + 1)).0"
                ;;
              *)
                NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
                ;;
            esac
          fi

          echo "Next tag: $NEXT_TAG"
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        if: steps.check.outputs.skip == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
