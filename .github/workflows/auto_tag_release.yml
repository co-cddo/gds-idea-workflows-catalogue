name: Auto Tag & Release

# Creates a git tag and GitHub release on push to main.
# Version bump level is determined by PR labels:
#   - bump:major -> major version bump
#   - bump:minor -> minor version bump
#   - (default)  -> patch version bump
#
# Usage in your repo:
#   jobs:
#     release:
#       uses: co-cddo/gds-idea-workflows-catalogue/.github/workflows/auto_tag_release.yml@main
#       secrets: inherit

on:
  workflow_call:

permissions:
  contents: write

jobs:
  auto-tag:
    name: Tag & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if HEAD already has a tag
        id: check
        run: |
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve bump level from PR labels
        if: steps.check.outputs.skip == 'false'
        id: bump
        run: |
          LABELS=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '[.[].labels[].name] | join(",")' 2>/dev/null || echo "")
          echo "Labels on merged PR: $LABELS"

          if echo "$LABELS" | grep -q "bump:major"; then
            BUMP="major"
          elif echo "$LABELS" | grep -q "bump:minor"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          echo "Bump level: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
          echo "Latest tag: $LATEST"

          if [ -z "$LATEST" ]; then
            NEXT_TAG="v0.1.0"
          else
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            case "${{ steps.bump.outputs.bump }}" in
              major)
                NEXT_TAG="v$((MAJOR + 1)).0.0"
                ;;
              minor)
                NEXT_TAG="v${MAJOR}.$((MINOR + 1)).0"
                ;;
              *)
                NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
                ;;
            esac
          fi

          echo "Next tag: $NEXT_TAG"
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        if: steps.check.outputs.skip == 'false'
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
