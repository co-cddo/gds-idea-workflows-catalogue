name: Allow merges only from selected branches

on:
  workflow_call:
    inputs:
      branch_name:
        type: string
        required: false
        default: dev
        description: "Branch name that is allowed to merge"

jobs:
  check-branch:
    runs-on: ubuntu-latest
    env:
      BRANCH_REF: 'refs/heads/${{ inputs.branch_name }}'
    steps:
    - name: Comment PR
      if: github.base_ref != env.BRANCH_REF
      uses: thollander/actions-comment-pull-request@v3
      with:
        message: |
          "Error: Pull request must come from '${{ inputs.branch_name }}' branch"

    - name: Check branch
      if: github.base_ref != env.BRANCH_REF
      run: |
        echo "Error: Pull request must come from '${{ inputs.branch_name }}' branch"
        exit 1
