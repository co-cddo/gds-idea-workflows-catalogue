name: Build & Publish to GDS IDEA PyPI Index

# Reusable workflow for package repos.
#
# Add this to your package repo's release workflow:
#
#   on:
#     release:
#       types: [published]
#   jobs:
#     publish:
#       uses: co-cddo/gds-idea-workflows-catalogue/.github/workflows/gds_idea_pypi_publish.yml@main
#       secrets: inherit
#
# Prerequisites:
#   - Your repo must have a pyproject.toml with a [build-system] section.
#   - The workflow is triggered by a published release (tag push + release creation).
#   - To trigger the index rebuild, set org-level secrets:
#     GDS_IDEA_PYPI_APP_ID and GDS_IDEA_PYPI_APP_PRIVATE_KEY
#     (from a GitHub App installed on co-cddo/gds-idea-pypi with contents:write).

on:
  workflow_call:
    secrets:
      GDS_IDEA_PYPI_APP_ID:
        description: "App ID for the gds-idea-pypi-rebuild GitHub App"
        required: false
      GDS_IDEA_PYPI_APP_PRIVATE_KEY:
        description: "Private key for the gds-idea-pypi-rebuild GitHub App"
        required: false

jobs:
  build-and-upload:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for gh release upload
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Strip v prefix from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build wheel and sdist
        run: uv build
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload artifacts to GitHub Release
        run: gh release upload "${{ github.ref_name }}" dist/*.whl dist/*.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub App token
        id: app-token
        if: ${{ secrets.GDS_IDEA_PYPI_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GDS_IDEA_PYPI_APP_ID }}
          private-key: ${{ secrets.GDS_IDEA_PYPI_APP_PRIVATE_KEY }}
          owner: co-cddo
          repositories: gds-idea-pypi

      - name: Trigger PyPI index rebuild
        if: steps.app-token.outputs.token != ''
        run: |
          gh api repos/co-cddo/gds-idea-pypi/dispatches \
            -f event_type=rebuild-index \
            -f "client_payload[repo]=${{ github.repository }}" \
            -f "client_payload[tag]=${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
